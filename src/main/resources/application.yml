server:
  port: 8085

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/orders/**

        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/notifications/**

        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/payments/**